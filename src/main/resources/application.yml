# $schema=invalid-url

spring:
  application:
    name: meshgroup-test

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,refresh,openapi,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true


